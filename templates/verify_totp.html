{% extends "base.html" %}
{% block title %}Двухфакторная аутентификация{% endblock %}
{% block content %}
<section class="auth-card">
  <p class="eyebrow">2FA</p>
  <h1>Введите код</h1>
  <p class="lead">Подойдет 6-значный код из приложения-аутентификатора или один из backup-кодов.</p>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form class="panel-form" method="post" action="/verify-totp">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <label>
      <span>Код</span>
      <input name="code" autocomplete="one-time-code" autofocus required>
    </label>
    <button class="button primary" type="submit">Подтвердить</button>
  </form>
</section>
{% endblock %}
