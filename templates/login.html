{% extends "base.html" %}
{% block title %}Вход{% endblock %}
{% block content %}
<section class="auth-card">
  <p class="eyebrow">Защищенный доступ</p>
  <h1>Вход</h1>
  <p class="lead">Откройте домашнюю медиатеку и продолжайте смотреть с любого устройства в сети.</p>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form class="panel-form" method="post" action="/login">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <label>
      <span>Логин</span>
      <input name="username" autocomplete="username" required>
    </label>
    <label>
      <span>Пароль</span>
      <input name="password" type="password" autocomplete="current-password" required>
    </label>
    <button class="button primary" type="submit">Войти</button>
  </form>
</section>
{% endblock %}
