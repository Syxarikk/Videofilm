{% extends "base.html" %}
{% block title %}Загрузки{% endblock %}
{% block content %}
<section class="hero-panel compact-hero">
  <div>
    <p class="eyebrow">Очередь</p>
    <h1>Активные загрузки</h1>
    <p class="lead">Статус qBittorrent обновляется каждые две секунды без перезагрузки страницы.</p>
  </div>
  <div class="hero-actions">
    <a class="button primary" href="/add-torrent">Добавить magnet</a>
    <a class="button secondary" href="/library">Библиотека</a>
  </div>
</section>

<div id="torrents-table"
     hx-get="/api/torrents/status"
     hx-trigger="load, every 2s"
     hx-swap="innerHTML"
     class="live-panel">
  <div class="loading-row">
    <span class="spinner"></span>
    <span>Получаем состояние загрузок...</span>
  </div>
</div>

<script>
document.body.addEventListener('htmx:afterRequest', (e) => {
  if (e.detail.requestConfig.path !== '/api/torrents/status') return;
  if (!e.detail.successful) {
    document.getElementById('torrents-table').innerHTML = '<p class="error">qBittorrent недоступен</p>';
    return;
  }

  const escapeHtml = (value) => String(value)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');

  const data = JSON.parse(e.detail.xhr.responseText);
  if (data.length === 0) {
    document.getElementById('torrents-table').innerHTML = `
      <section class="empty-state small">
        <p class="eyebrow">Очередь пуста</p>
        <h2>Активных загрузок нет</h2>
        <p>Новые magnet-ссылки появятся здесь сразу после добавления.</p>
      </section>
    `;
    return;
  }

  const rows = data.map(t => `
    <tr>
      <td class="torrent-name">${escapeHtml(t.name)}</td>
      <td>
        <div class="progress-cell">
          <span>${t.progress_percent}%</span>
          <div class="progress-track"><span style="width:${t.progress_percent}%"></span></div>
        </div>
      </td>
      <td>${escapeHtml(t.speed_human)}</td>
      <td>${escapeHtml(t.eta_human)}</td>
      <td><span class="status-chip ${t.is_complete ? 'done' : 'active'}">${escapeHtml(t.state)}</span></td>
    </tr>
  `).join('');

  document.getElementById('torrents-table').innerHTML = `
    <div class="table-shell">
      <table>
        <thead><tr><th>Название</th><th>Прогресс</th><th>Скорость</th><th>ETA</th><th>Статус</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
});
</script>
{% endblock %}
