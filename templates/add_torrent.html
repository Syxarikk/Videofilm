{% extends "base.html" %}
{% block title %}Добавить торрент{% endblock %}
{% block content %}
<section class="form-page">
  <div>
    <p class="eyebrow">Новая загрузка</p>
    <h1>Добавить magnet-ссылку</h1>
    <p class="lead">Сервер передаст задачу в qBittorrent, а готовый файл появится в библиотеке после завершения загрузки.</p>
  </div>

  <form class="panel-form wide" method="post" action="/api/torrents">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <label>
      <span>Magnet-ссылка</span>
      <input name="magnet" placeholder="magnet:?xt=urn:btih:..." required>
    </label>
    <div class="form-actions">
      <button class="button primary" type="submit">Добавить</button>
      <a class="button secondary" href="/downloads">Активные загрузки</a>
      <a class="button ghost" href="/library">Библиотека</a>
    </div>
  </form>
</section>
{% endblock %}
