{% extends "base.html" %}
{% block title %}Смена пароля{% endblock %}
{% block content %}
<section class="auth-card">
  <p class="eyebrow">Первый запуск</p>
  <h1>Задайте новый пароль</h1>
  <p class="lead">Минимум 12 символов. Это обязательный шаг для нового аккаунта.</p>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form class="panel-form" method="post" action="/change-password">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <label>
      <span>Новый пароль</span>
      <input name="new_password" type="password" autocomplete="new-password" required>
    </label>
    <label>
      <span>Повторите</span>
      <input name="confirm" type="password" autocomplete="new-password" required>
    </label>
    <button class="button primary" type="submit">Сохранить</button>
  </form>
</section>
{% endblock %}
